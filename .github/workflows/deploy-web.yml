name: Deploy Web (Static Web Apps)

# CD del frontend web: al pushear a main tocando app/, buildea el export web
# de Expo y lo publica en Azure Static Web Apps.
#
# REQUISITOS (Settings > Secrets and variables > Actions):
#   Secret: AZURE_STATIC_WEB_APPS_API_TOKEN -> deployment token de la SWA
#           (az staticwebapp secrets list -n subastas-web -g rg-subastas
#            --query properties.apiKey -o tsv)

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Build web (Expo export)
        working-directory: app
        env:
          # URL del backend en la VM (no es secreto). Cambiar aca si cambia el host.
          EXPO_PUBLIC_API_URL: https://subastas-api-fvasquez.canadacentral.cloudapp.azure.com/api
        run: |
          npm ci --no-audit --no-fund
          npx expo export -p web
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: app/dist
          skip_app_build: true
          skip_api_build: true
